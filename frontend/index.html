<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Open Graph: site-wide defaults (title, description, url, canonical managed per-page via Helmet) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://bosnia-lens.netlify.app/og-image.png"
    />

    <!-- Twitter: site-wide defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://bosnia-lens.netlify.app/og-image.png"
    />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://bosnia-lens.netlify.app/#website",
            "url": "https://bosnia-lens.netlify.app/",
            "name": "Bosnia Lens",
            "description": "Free, open-source public data about Bosnia and Herzegovina. Browse universities and academic programs via REST API or interactive interface.",
            "inLanguage": "en"
          },
          {
            "@type": "Dataset",
            "@id": "https://bosnia-lens.netlify.app/#universities",
            "name": "Bosnia and Herzegovina Universities",
            "description": "A comprehensive dataset of accredited universities, faculties, study programs, and subjects in Bosnia and Herzegovina.",
            "url": "https://bosnia-lens.netlify.app/universities",
            "license": "https://www.gnu.org/licenses/agpl-3.0.html",
            "isAccessibleForFree": true,
            "creator": {
              "@type": "Person",
              "name": "Goran Jovic",
              "url": "https://github.com/goran1010"
            },
            "distribution": [
              {
                "@type": "DataDownload",
                "encodingFormat": "application/json",
                "contentUrl": "https://round-leann-goran-jovic-1010-ccad2ae8.koyeb.app/api/v1/universities"
              }
            ],
            "spatialCoverage": {
              "@type": "Place",
              "name": "Bosnia and Herzegovina"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
