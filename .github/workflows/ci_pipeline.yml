name: CI pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Run lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm run install:all

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Lint backend
        run: npm run lint:backend

  test:
    runs-on: ubuntu-latest
    name: Run tests

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: postgres
        options: >-
          --health-cmd="pg_isready -U test_user -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      VITE_BACKEND_URL: http://localhost:3000
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: test
      BACKEND_URL: http://localhost:3000
      COOKIE_SECRET: "123456789"
      TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/postgres
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/postgres_db,
      RESEND_API_KEY: random_text_for_ci,
      GITHUB_CLIENT_ID: random_text_for_ci,
      GITHUB_CLIENT_SECRET: random_text_for_ci,
      GITHUB_CALLBACK_URL: random_text_for_ci,

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm run install:all

      - name: Test frontend
        run: npm run test:frontend

      - name: Migrate database and generate Prisma client
        run: npm run db:deploy_generate

      - name: Test backend
        run: npm run test:backend
