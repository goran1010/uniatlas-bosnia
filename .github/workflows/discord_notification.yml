name: Send message to Discord

on:
  push:

  pull_request:
    types: [opened, closed, reopened]

  issues:
    types: [opened, closed, reopened]

jobs:
  message:
    name: Send message
    runs-on: ubuntu-latest

    steps:
      - name: Limit issue/PR text
        id: limit_text
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const maxLength = 750;

            const body =
              context.payload.pull_request?.body ||
              context.payload.issue?.body ||
              context.payload.head_commit?.message ||
              "No text/body provided.";

            if (body.length <= maxLength) {
              return body;
            }

            return body.slice(0, maxLength) + "...";

      - uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          nodetail: true
          webhook: ${{ secrets.DISCORD_WEBHOOK }}

          title: ${{ github.event.pull_request.title || github.event.issue.title || 'Commit Pushed' }}
          color: 0x0000ff
          url: ${{ github.event.pull_request.html_url || github.event.issue.html_url || github.event.head_commit.url }}
          username: GitHub Actions

          description: |
            Event: `${{ github.event_name }}`
            Action: `${{ github.event.action || 'push' }}`
            Status: ${{ job.status }}

            Opened by: `${{ github.event.pull_request.user.login || github.event.issue.user.login || github.actor }}`
            Triggered by: `${{ github.event.sender.login || github.actor }}`

            ${{ steps.limit_text.outputs.result }}
